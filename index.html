<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Jimmy Kids English</h1>

<div id="score">Score: 0</div>

<div id="game"></div>

<script src="words.js"></script>

<script>

let answer=""
let score=0

function speak(word){

const u = new SpeechSynthesisUtterance(word)
u.lang="en-US"
speechSynthesis.cancel()
speechSynthesis.speak(u)

}

function shuffle(a){
return [...a].sort(()=>Math.random()-0.5)
}

function newQuestion(){

const q = words[Math.floor(Math.random()*words.length)]

answer = q.word

const options = shuffle(words).slice(0,4).map(w=>w.word)

if(!options.includes(answer)){
options[Math.floor(Math.random()*4)] = answer
}

document.getElementById("game").innerHTML = `

<div class="card">${q.emoji}</div>

<button class="speak" onclick="speak('${q.word}')">
🔊 Listen
</button>

<div class="buttons">

${options.map(w=>`
<button onclick="check('${w}')">${w}</button>
`).join("")}

</div>

`

}

function check(word){

speak(word)

if(word==answer){

score++

document.getElementById("score").innerText="Score: "+score

setTimeout(()=>{
alert("Correct!")
newQuestion()
},200)

}else{

alert("Try again")

}

}

newQuestion()

</script>

</body>
</html>
