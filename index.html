<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jimmy Kids English</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f6ff;
      color: #111827;
    }

    h1 {
      color: #4a7cff;
      font-size: 40px;
      margin: 10px 0;
    }

    #score {
      font-size: 24px;
      margin: 10px 0 20px;
    }

    #emoji {
      font-size: 90px;
      margin: 30px 0 20px;
    }

    .btn-wrap {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      max-width: 760px;
      margin: 0 auto;
    }

    button {
      padding: 14px 20px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      background: #4a7cff;
      color: white;
      min-width: 120px;
      cursor: pointer;
    }

    #listenBtn {
      background: #16a34a;
      margin-bottom: 18px;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      min-height: 30px;
    }
  </style>
</head>
<body>

  <h1>Jimmy Kids English</h1>
  <div id="score">Score: 0</div>

  <div id="emoji">🐱</div>

  <div>
    <button id="listenBtn">🔊 Listen</button>
  </div>

  <div class="btn-wrap">
    <button onclick="checkAnswer('cat')">cat</button>
    <button onclick="checkAnswer('dog')">dog</button>
    <button onclick="checkAnswer('bird')">bird</button>
    <button onclick="checkAnswer('fish')">fish</button>
    <button onclick="checkAnswer('rabbit')">rabbit</button>
  </div>

  <div id="result"></div>

  <script>
    var words = [
      { emoji: "🐱", word: "cat" },
      { emoji: "🐶", word: "dog" },
      { emoji: "🐦", word: "bird" },
      { emoji: "🐟", word: "fish" },
      { emoji: "🐰", word: "rabbit" }
    ];

    var answer = "cat";
    var score = 0;

    function newQuestion() {
      var index = Math.floor(Math.random() * words.length);
      var q = words[index];
      answer = q.word;
      document.getElementById("emoji").innerText = q.emoji;
      document.getElementById("result").innerText = "";
    }

    function speakWord(word) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(word);
      u.lang = "en-US";
      u.rate = 0.9;
      u.pitch = 1;
      window.speechSynthesis.speak(u);
    }

    function checkAnswer(word) {
      if (word === answer) {
        score = score + 1;
        document.getElementById("score").innerText = "Score: " + score;
        document.getElementById("result").innerText = "Correct! 🎉";
        speakWord(word);
        setTimeout(newQuestion, 800);
      } else {
        document.getElementById("result").innerText = "Try again";
        speakWord(word);
      }
    }

    document.getElementById("listenBtn").onclick = function () {
      speakWord(answer);
    };

    newQuestion();
  </script>

</body>
</html>
